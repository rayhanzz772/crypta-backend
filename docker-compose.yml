services:
  # ===================================
  # Crypta API (Node.js/Express)
  # ===================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crypta-app
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-5006}:5000"
    environment:
      PORT: ${PORT:-5000}
      NODE_ENV: ${NODE_ENV:-development}

      # Database
      DB_CONNECTION: ${DB_CONNECTION:-postgresql}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS:-postgres}
      DB_NAME: ${DB_NAME:-crypta}

      # Auth / Security
      JWT_SECRET: ${JWT_SECRET}
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-30m}
      AUTH_AUDIENCE: ${AUTH_AUDIENCE}
      CRYPTA_KEK: ${CRYPTA_KEK}
      FILE_ENCRYPTION_KEY: ${FILE_ENCRYPTION_KEY}

      # External APIs
      IP_QUALITY_SCORE_API_KEY: ${IP_QUALITY_SCORE_API_KEY}
      API_ML: ${API_ML:-http://localhost:5001}
      GROQ_API_KEY: ${GROQ_API_KEY}

      # Mail
      MAIL_FROM_EMAIL: ${MAIL_FROM_EMAIL}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASS: ${MAIL_PASS}

      # MinIO
      MINIO_ENDPOINT: minio
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-crypta_admin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-crypta-files}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - crypta-network

  # ===================================
  # PostgreSQL Database
  # ===================================
  postgres:
    image: postgres:16-alpine
    container_name: crypta-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
      POSTGRES_DB: ${DB_NAME:-crypta}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-crypta}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crypta-network

  # ===================================
  # MinIO Object Storage
  # ===================================
  minio:
    image: minio/minio:latest
    container_name: crypta-minio
    restart: unless-stopped
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-crypta_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crypta-network

  # ===================================
  # MinIO Bucket Init (one-shot)
  # ===================================
  minio-init:
    image: minio/mc:latest
    container_name: crypta-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-crypta_admin} ${MINIO_SECRET_KEY} &&
        mc mb --ignore-existing local/${MINIO_BUCKET:-crypta-files} &&
        mc anonymous set download local/${MINIO_BUCKET:-crypta-files} || true
      "
    networks:
      - crypta-network

# ===================================
# Volumes
# ===================================
volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local

# ===================================
# Networks
# ===================================
networks:
  crypta-network:
    driver: bridge
